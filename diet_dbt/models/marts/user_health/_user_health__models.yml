version: 2

models:
  - name: fct_bmi_evolution
    description: >
      One row per weight log entry per user. Tracks BMI over time as the user
      updates their weight. Join dim_users on user_id for user profile; join
      dim_date on recorded_date_id for date attributes.
      Grain: weight_log_id (surrogate from user_id + weight_kg + recorded_at UTC).
    columns:
      - name: weight_log_id
        data_type: varchar
        description: "Surrogate PK: md5 hash of user_id + weight_kg + recorded_at (UTC-normalised)"
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_type: integer
        description: "References dim_users"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: weight_kg
        data_type: float
        description: "Self-reported body weight in kilograms at the time of the log"
        data_tests:
          - not_null
      - name: height_cm
        data_type: float
        description: "User height in centimetres (static)"
        data_tests:
          - not_null
      - name: bmi
        data_type: float
        description: "Body Mass Index at this weight log entry, rounded to 1 decimal"
        data_tests:
          - not_null
      - name: recorded_date_id
        data_type: integer
        description: "YYYYMMDD integer FK to dim_date (e.g. 20250115)"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id

  - name: dim_foods
    description: >
      One row per Foundation Food, with descriptive attributes and macro
      nutrient content per 100g. This is a dimension, not a fact: nutrient
      values describe the food and are not generated by a business event.
      Grain: fdc_id.
    columns:
      - name: fdc_id
        data_type: integer
        description: "Unique identifier for the food, primary key of this dimension"
        data_tests:
          - unique
          - not_null
      - name: description
        data_type: varchar
        description: "Human-readable name of the food"
        data_tests:
          - not_null
      - name: publication_date_id
        data_type: integer
        description: "YYYYMMDD integer FK to dim_date for the publication date (e.g. 20240101)"
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: protein_g
        data_type: double
        description: "Protein content in grams per 100g"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: fat_g
        data_type: double
        description: "Total fat content in grams per 100g"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: carbohydrate_g
        data_type: double
        description: "Total carbohydrate content in grams per 100g"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: fiber_g
        data_type: double
        description: "Total dietary fiber in grams per 100g"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: total_sugar_g
        data_type: double
        description: "Total sugar content in grams per 100g"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: loaded_date_id
        data_type: integer
        description: "YYYYMMDD integer FK to dim_date for the load date (e.g. 20260621)"
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_id

  - name: fct_meal_logs
    description: >
      One row per food item logged per user per meal per day. Join dim_foods on
      fdc_id to get food descriptions; join the meals seed on meal_id for meal names.
      Use fct_meal_log_nutrients for nutrient totals per meal.
      Grain: user_id + meal_id + fdc_id + logged_date.
    columns:
      - name: user_id
        data_type: integer
        description: "References dim_users"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: meal_id
        data_type: integer
        description: "References the meals seed (1=breakfast, 2=lunch, 3=dinner)"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_meals')
              field: meal_id
      - name: fdc_id
        data_type: integer
        description: "References dim_foods — the food item logged in this meal"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_foods')
              field: fdc_id
      - name: grams
        data_type: float
        description: "Serving size in grams logged for this food item"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1000
      - name: logged_date
        data_type: date
        description: "Date on which the meal was logged"
        data_tests:
          - not_null
      - name: logged_date_id
        data_type: integer
        description: "YYYYMMDD integer FK to dim_date (e.g. 20260621)"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id

  - name: fct_meal_log_nutrients
    description: >
      One row per user per meal per nutrient per day. Long format: nutrient_id
      is a FK to dim_nutrients, value_g is the total intake for that nutrient
      in that meal. Nutrients are scaled by actual serving size (nutrient_per_100g
      x grams / 100) and summed across all food items in the meal.
      Grain: user_id + meal_id + nutrient_id + logged_date.
    columns:
      - name: user_id
        data_type: integer
        description: "References dim_users"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: meal_id
        data_type: integer
        description: "References the meals seed (1=breakfast, 2=lunch, 3=dinner)"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_meals')
              field: meal_id
      - name: nutrient_id
        data_type: integer
        description: "References dim_nutrients (1=Protein, 2=Fat, 3=Carbohydrate, 4=Fiber, 5=Total Sugar)"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_nutrients')
              field: nutrient_id
      - name: logged_date
        data_type: date
        description: "Date on which the meal was logged"
        data_tests:
          - not_null
      - name: logged_date_id
        data_type: integer
        description: "YYYYMMDD integer FK to dim_date (e.g. 20260621)"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: value_g
        data_type: double
        description: "Total grams of this nutrient in this meal (sum across all food items at 100g each)"
