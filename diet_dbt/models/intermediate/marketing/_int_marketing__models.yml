version: 2

models:
  - name: int_user_nutrient_segments
    description: >
      One row per user per nutrient per day. Joins int_daily_nutrient_intake to
      int_users_with_bmi and nutrient_daily_targets to classify whether each
      user's daily intake is flagged. Protein threshold is personalised
      (weight_kg x 0.8 inline); all other thresholds are generic seed values.
      Building block for fct_user_segments.
      Grain: user_id + nutrient_id + logged_date.
    columns:
      - name: user_id
        data_type: integer
        description: "References the user"
        data_tests:
          - not_null
      - name: nutrient_id
        data_type: integer
        description: "Sequential nutrient identifier"
        data_tests:
          - not_null
      - name: logged_date
        data_type: date
        description: "Date of the classification record"
        data_tests:
          - not_null
      - name: logged_date_id
        data_type: integer
        description: "YYYYMMDD integer FK to dim_date (e.g. 20260621)"
        data_tests:
          - not_null
      - name: daily_value_g
        data_type: double
        description: "Total grams of this nutrient consumed that day, rounded to 2dp"
      - name: threshold_g
        data_type: double
        description: "Recommended threshold in grams. Personalised for protein, generic for others."
      - name: threshold_type
        data_type: varchar
        description: "min = flagged when below threshold, max = flagged when above threshold"
      - name: segment_label
        data_type: varchar
        description: "Segment name if flagged (low_protein, high_fat, low_fiber, high_sugar)"
      - name: is_flagged
        data_type: boolean
        description: "True if this user's intake for this nutrient on this day is outside the recommendation"

  - name: int_user_segments_windowed
    description: >
      One row per user per nutrient. Computes intake averages across three windows
      (last day, last 7 days, last 30 days) and classifies each window against
      recommended thresholds. Protein threshold is personalised (weight_kg x 0.8)
      inline from int_users_with_bmi. Building block for fct_user_segments_windowed.
      Grain: user_id + nutrient_id.
    columns:
      - name: user_id
        data_type: integer
        description: "References the user"
        data_tests:
          - not_null
      - name: nutrient_id
        data_type: integer
        description: "Sequential nutrient identifier (excludes carbohydrate — no segment defined)"
        data_tests:
          - not_null
      - name: reference_date
        data_type: date
        description: "Most recent logged date for this user — anchor for all window calculations"
        data_tests:
          - not_null
      - name: last_day_g
        data_type: double
        description: "Total intake on the reference date"
      - name: last_7d_avg_g
        data_type: double
        description: "Average daily intake over the 7 days ending on reference_date"
      - name: last_30d_avg_g
        data_type: double
        description: "Average daily intake over the 30 days ending on reference_date"
      - name: threshold_g
        data_type: double
        description: "Recommended threshold in grams. Personalised for protein, generic for others."
      - name: threshold_type
        data_type: varchar
        description: "min = flagged when below threshold, max = flagged when above threshold"
      - name: segment_label
        data_type: varchar
        description: "Segment name if flagged (low_protein, high_fat, low_fiber, high_sugar)"
      - name: is_flagged_last_day
        data_type: boolean
        description: "True if last day intake is outside the recommended range"
      - name: is_flagged_last_7d
        data_type: boolean
        description: "True if 7-day average is outside the recommended range"
      - name: is_flagged_last_30d
        data_type: boolean
        description: "True if 30-day average is outside the recommended range"
